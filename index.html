<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>LinkIT</title>
</head>
<body class="bg-light">

    <div class="container py-5" style="max-width: 1000px;">
        <div class="card shadow-lg p-4">
            <h3 class="mb-4 text-center text-primary fw-bold">LinkIT</h3>
            <p class="mb-4 text-center text-dark fw-bold">IT Support Center</p>
            
            <div id="view-login">
                <div class="mb-4 p-3 bg-white border rounded">
                    <h6 class="text-center text-muted">Statistik Layanan IT</h6>
                    <canvas id="loginChart" height="80"></canvas>
                </div>
                <input type="password" id="pass-input" class="form-control mb-3" placeholder="Masukkan Password Akses...">
                <button onclick="login()" class="btn btn-dark w-100">Masuk ke Portal</button>
            </div>

            <div id="view-app" style="display:none;">
                <div class="row mb-4" id="stats-panel">
                    <div class="col-md-4"><div class="card bg-info text-white p-3 text-center"><h6>Total Tiket</h6><h4 id="stat-total">0</h4></div></div>
                    <div class="col-md-4"><div class="card bg-warning text-dark p-3 text-center"><h6>Pending</h6><h4 id="stat-open">0</h4></div></div>
                    <div class="col-md-4"><div class="card bg-success text-white p-3 text-center"><h6>Selesai</h6><h4 id="stat-resolved">0</h4></div></div>
                </div>

                <div class="mb-4 p-3 bg-white border rounded">
                    <canvas id="ticketChart" height="80"></canvas>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="welcome-msg" class="text-muted fw-bold"></span>
                    <button onclick="logout()" class="btn btn-sm btn-outline-danger">Logout</button>
                </div>
                
                <div id="section-input" style="display:none;" class="mb-4 p-3 bg-white border rounded">
                    <div class="row">
                        <div class="col-md-8">
                            <input type="text" id="nama" class="form-control mb-2" placeholder="Nama Anda...">
                            <textarea id="judul" class="form-control mb-2" placeholder="Jelaskan kendala teknis..."></textarea>
                            <input type="file" id="foto" class="form-control form-control-sm" accept="image/*">
                        </div>
                        <div class="col-md-4">
                            <select id="kategori" class="form-select mb-2">
                                <option value="Hardware">Hardware</option>
                                <option value="Software">Software</option>
                                <option value="Jaringan">Jaringan</option>
                            </select>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="urgent"><label class="form-check-label text-danger fw-bold">Urgent</label></div>
                            <button onclick="addTicket()" class="btn btn-primary w-100">Kirim Tiket</button>
                        </div>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr><th>Kendala</th><th>Pelapor</th><th>Kategori</th><th>Feedback IT</th><th>Status</th><th>SLA</th><th>Aksi</th></tr>
                        </thead>
                        <tbody id="ticket-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://zpxsianngoelzlwakhbi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpweHNpYW5uZ29lbHpsd2FraGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODY5NDYsImV4cCI6MjA5NzU2Mjk0Nn0.3dzKK_GX7tb--8AXd4LEYpH4ZPVQ0RwOR09JtQ_7GQo');
        let myChart, loginChart;

        async function loadTickets() {
            const { data } = await sb.from('tickets').select('*').order('id', { ascending: false });
            const currentRole = localStorage.getItem('role');
            
            // Update statistik
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-open').innerText = data.filter(t => t.status == 'Open').length;
            document.getElementById('stat-resolved').innerText = data.filter(t => t.status == 'Resolved').length;

            updateChart(data);
            updateLoginChart(data);

            if (currentRole) {
                document.getElementById('ticket-list').innerHTML = data.map(t => `
                    <tr class="${t.urgensi ? 'table-danger' : ''}">
                        <td class="fw-medium">
                            ${t.judul} ${t.urgensi ? '⚠️' : ''}
                            ${t.foto_url ? `<br><a href="${t.foto_url}" target="_blank" class="badge bg-info text-decoration-none">Lihat Lampiran</a>` : ''}
                        </td>
                        <td><span class="badge bg-light text-dark border">${t.nama || 'Anonim'}</span></td>
                        <td><span class="badge bg-secondary">${t.kategori || 'General'}</span></td>
                        <td><small class="text-muted">${t.komentar_it || '-'}</small></td>
                        <td><span class="badge ${t.status=='Open' ? 'bg-warning' : 'bg-success'}">${t.status}</span></td>
                        <td>${t.status == 'Open' ? Math.floor((new Date() - new Date(t.created_at))/(36e5)) + ' Jam' : '-'}</td>
                        <td>
                            ${currentRole === 'admin' ? 
                                `<div class="btn-group">
                                    <select class="form-select form-select-sm" onchange="updateStatus(${t.id}, this.value)">
                                        <option ${t.status=='Open'?'selected':''}>Open</option>
                                        <option ${t.status=='Resolved'?'selected':''}>Resolved</option>
                                    </select>
                                    <button class="btn btn-sm btn-outline-info" onclick="addFeedback(${t.id}, '${t.komentar_it || ''}')">Note</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTicket(${t.id})">Del</button>
                                </div>` : '<small>Menunggu IT</small>'}
                        </td>
                    </tr>
                `).join('');
            }
        }

        function updateChart(data) {
            const ctx = document.getElementById('ticketChart').getContext('2d');
            const counts = { Hardware: 0, Software: 0, Jaringan: 0 };
            data.forEach(t => { if(counts.hasOwnProperty(t.kategori)) counts[t.kategori]++; });

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Hardware', 'Software', 'Jaringan'],
                    datasets: [{ label: 'Jumlah Tiket per Kategori', data: Object.values(counts), backgroundColor: ['#0dcaf0', '#ffc107', '#198754'] }]
                }
            });
        }

        function updateLoginChart(data) {
            const ctx = document.getElementById('loginChart').getContext('2d');
            const counts = { Hardware: 0, Software: 0, Jaringan: 0 };
            data.forEach(t => { if(counts.hasOwnProperty(t.kategori)) counts[t.kategori]++; });

            if (loginChart) loginChart.destroy();
            loginChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Hardware', 'Software', 'Jaringan'],
                    datasets: [{ data: Object.values(counts), backgroundColor: ['#0dcaf0', '#ffc107', '#198754'] }]
                }
            });
        }

        async function addFeedback(id, currentNote) {
            const { value: note } = await Swal.fire({ title: 'Tambah Feedback IT', input: 'textarea', inputValue: currentNote, showCancelButton: true });
            if (note !== undefined) {
                await sb.from('tickets').update({ komentar_it: note }).eq('id', id);
                loadTickets();
            }
        }

        async function deleteTicket(id) {
            const result = await Swal.fire({ title: 'Hapus tiket ini?', icon: 'warning', showCancelButton: true });
            if (result.isConfirmed) { await sb.from('tickets').delete().eq('id', id); loadTickets(); }
        }

        async function addTicket() {
            let foto_url = null;
            const fileInput = document.getElementById('foto');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileName = `${Date.now()}_${file.name}`;
                const { data, error } = await sb.storage.from('ticket-images').upload(fileName, file);
                if (error) return Swal.fire('Error', 'Gagal upload foto', 'error');
                const { data: publicUrl } = sb.storage.from('ticket-images').getPublicUrl(fileName);
                foto_url = publicUrl.publicUrl;
            }
            const data = { 
                nama: document.getElementById('nama').value,
                judul: document.getElementById('judul').value, 
                kategori: document.getElementById('kategori').value, 
                urgensi: document.getElementById('urgent').checked, 
                status: 'Open',
                foto_url: foto_url
            };
            if(!data.judul || !data.nama) return Swal.fire('Error', 'Isi nama dan kendala!', 'error');
            await sb.from('tickets').insert([data]);
            loadTickets();
        }

        async function updateStatus(id, status) {
            await sb.from('tickets').update({ status }).eq('id', id);
            loadTickets();
        }

        async function login() {
            const pass = document.getElementById('pass-input').value;
            let role = (pass === 'Zero') ? 'admin' : (pass === 'pengguna') ? 'user' : null;
            if (role) { localStorage.setItem('role', role); location.reload(); }
            else Swal.fire('Error', 'Password salah', 'error');
        }

        function logout() { localStorage.clear(); location.reload(); }

        const role = localStorage.getItem('role');
        if (role) {
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-app').style.display = 'block';
            if (role === 'user') document.getElementById('section-input').style.display = 'block';
        }
        loadTickets();
    </script>
</body>
</html>
